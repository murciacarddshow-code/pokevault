<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280" width="400" height="280">
  <defs>
    <linearGradient id="bg8" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0200;stop-opacity:1"/>
      <stop offset="60%" style="stop-color:#05050F;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1a0200;stop-opacity:1"/>
    </linearGradient>
    <radialGradient id="glow8" cx="35%" cy="50%" r="60%">
      <stop offset="0%" style="stop-color:#E74C3C;stop-opacity:0.35"/>
      <stop offset="70%" style="stop-color:#E74C3C;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:transparent;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glow28" cx="75%" cy="55%" r="45%">
      <stop offset="0%" style="stop-color:#FF6B35;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:transparent;stop-opacity:0"/>
    </radialGradient>
    <linearGradient id="shimmer8" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:transparent"/>
      <stop offset="45%" style="stop-color:white;stop-opacity:0.04"/>
      <stop offset="50%" style="stop-color:white;stop-opacity:0.12"/>
      <stop offset="55%" style="stop-color:white;stop-opacity:0.04"/>
      <stop offset="100%" style="stop-color:transparent"/>
    </linearGradient>
    <filter id="gf8">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="blur8"><feGaussianBlur stdDeviation="18"/></filter>
    <clipPath id="cc8"><rect width="400" height="280" rx="18"/></clipPath>
  </defs>

  <g clip-path="url(#cc8)">
    <!-- Background -->
    <rect width="400" height="280" fill="url(#bg8)"/>
    <!-- Glow blobs -->
    <ellipse cx="120" cy="140" rx="160" ry="130" fill="url(#glow8)"/>
    <ellipse cx="310" cy="150" rx="110" ry="100" fill="url(#glow28)"/>
    
    <!-- Grid pattern -->
    <path d="M0,0 L400,0 M0,40 L400,40 M0,80 L400,80 M0,120 L400,120 M0,160 L400,160 M0,200 L400,200 M0,240 L400,240 M0,280 L400,280 M0,0 L0,280 M50,0 L50,280 M100,0 L100,280 M150,0 L150,280 M200,0 L200,280 M250,0 L250,280 M300,0 L300,280 M350,0 L350,280 M400,0 L400,280"
      stroke="#E74C3C" stroke-width="0.3" opacity="0.08"/>
    
    <!-- Left art panel -->
    <rect x="20" y="20" width="160" height="240" fill="#1a0200" rx="10" opacity="0.5"/>
    <rect x="20" y="20" width="160" height="240" fill="none" stroke="#E74C3C" stroke-width="0.8" rx="10" opacity="0.4"/>
    
    <!-- Large symbol in art panel -->
    <text x="100" y="175" text-anchor="middle" font-size="100" fill="#E74C3C" opacity="0.12" font-family="Arial">◉</text>
    
    <!-- Inner circles in art panel -->
    <circle cx="100" cy="140" r="70" fill="none" stroke="#E74C3C" stroke-width="1" opacity="0.15" stroke-dasharray="6,4"/>
    <circle cx="100" cy="140" r="50" fill="none" stroke="#FF6B35" stroke-width="0.8" opacity="0.2"/>
    <circle cx="100" cy="140" r="30" fill="none" stroke="#E74C3C" stroke-width="1.5" opacity="0.25"/>
    <circle cx="100" cy="140" r="10" fill="#E74C3C" opacity="0.3"/>
    <!-- Cross -->
    <line x1="30" y1="140" x2="170" y2="140" stroke="#E74C3C" stroke-width="0.5" opacity="0.2"/>
    <line x1="100" y1="25" x2="100" y2="255" stroke="#E74C3C" stroke-width="0.5" opacity="0.2"/>
    
    <!-- Card stack illusion (3 cards behind) -->
    <rect x="218" y="35" width="145" height="200" fill="#1a0200" rx="8" opacity="0.4"/>
    <rect x="215" y="32" width="145" height="200" fill="#1a0200" rx="8" opacity="0.6" stroke="#E74C3C" stroke-width="0.5" stroke-opacity="0.3"/>
    
    <!-- Main front card -->
    <rect x="210" y="28" width="160" height="220" fill="#06050F" rx="10"/>
    <rect x="210" y="28" width="160" height="220" fill="none" stroke="#E74C3C" stroke-width="1.5" rx="10" opacity="0.7"/>
    <rect x="215" y="33" width="150" height="210" fill="none" stroke="#FF6B35" stroke-width="0.5" rx="8" opacity="0.3"/>
    <!-- Card art area on front card -->
    <rect x="218" y="42" width="144" height="140" fill="#1a0200" rx="6" opacity="0.8"/>
    <ellipse cx="290" cy="112" rx="55" ry="55" fill="#E74C3C" opacity="0.12"/>
    <text x="290" y="120" text-anchor="middle" font-size="60" fill="#E74C3C" opacity="0.2" font-family="Arial">◉</text>
    <!-- Card info stripes on front card -->
    <rect x="218" y="188" width="144" height="1" fill="#E74C3C" opacity="0.3"/>
    <text x="290" y="208" text-anchor="middle" font-size="9" fill="#FF6B35" opacity="0.7" font-family="Arial" letter-spacing="2">FIRE</text>
    <text x="290" y="224" text-anchor="middle" font-size="7" fill="#E74C3C" opacity="0.5" font-family="Arial" letter-spacing="1">POKÉVAULT EXCLUSIVE</text>
    
    <!-- Shimmer on front card -->
    <rect x="210" y="28" width="160" height="220" fill="url(#shimmer8)" rx="10">
      <animateTransform attributeName="transform" type="translate"
        values="-200,0;200,0;-200,0" dur="5s" repeatCount="indefinite"/>
    </rect>
    
    <!-- Right text panel -->
    <rect x="20" y="0" width="370" height="18" fill="#1a0200" opacity="0.7"/>
    <text x="200" y="13" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#E74C3C" opacity="0.5" letter-spacing="4">POKÉVAULT · COLLECTOR SERIES</text>
    
    <!-- Main title -->
    <text x="105" y="45" text-anchor="middle" font-family="Arial Black,sans-serif"
      font-size="28" font-weight="900" fill="#FF6B35" filter="url(#gf8)" letter-spacing="1">CHARIZARD</text>
    <text x="105" y="72" text-anchor="middle" font-family="Arial,sans-serif"
      font-size="16" fill="#E74C3C" letter-spacing="5" opacity="0.9">HUNT</text>
    
    <!-- Horizontal rule -->
    <line x1="30" y1="82" x2="178" y2="82" stroke="#E74C3C" stroke-width="0.5" opacity="0.4"/>
    
    <!-- Type badge -->
    <rect x="45" y="90" width="120" height="18" fill="#E74C3C" opacity="0.15" rx="9"/>
    <rect x="45" y="90" width="120" height="18" fill="none" stroke="#E74C3C" stroke-width="0.5" rx="9" opacity="0.5"/>
    <text x="105" y="103" text-anchor="middle" font-family="Arial,sans-serif" font-size="9"
      fill="#E74C3C" letter-spacing="3">FIRE</text>
    
    <!-- Bottom border -->
    <rect x="0" y="262" width="400" height="18" fill="#1a0200" opacity="0.8"/>
    <rect x="0" y="262" width="400" height="1" fill="#E74C3C" opacity="0.4"/>
    <text x="200" y="275" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#E74C3C" opacity="0.4" letter-spacing="3">POKÉVAULT</text>
    
    <!-- Outer border -->
    <rect x="1" y="1" width="398" height="278" fill="none" stroke="#E74C3C" stroke-width="1.5" rx="18" opacity="0.7"/>
  </g>
</svg>